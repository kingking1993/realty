<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Realty{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&family=Noto+Serif+KR:wght@400;600;700;900&family=JetBrains+Mono:wght@400;600;700&display=swap">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <a href="#main" class="skip-link">본문 바로가기</a>
  <nav class="topnav">
    <a href="/" class="brand">REALTY</a>
    <a href="/">대시보드</a>
    <a href="/feed">뉴스·카페</a>
    <span class="spacer"></span>
    <button class="btn" onclick="collect('listings', this)">매물 수집</button>
    <button class="btn" onclick="collect('transactions', this)">실거래 수집</button>
    <button class="btn" onclick="collect('articles', this)">뉴스 수집</button>
  </nav>
  <main id="main">
    {% block content %}{% endblock %}
  </main>
  <script>
    async function collect(job, btn) {
      btn.disabled = true;
      const orig = btn.textContent;
      btn.textContent = '실행 중…';
      try {
        await fetch('/collect/' + job, {method: 'POST'});
        btn.textContent = '시작됨 ✓ (잠시 후 새로고침)';
        setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 5000);
      } catch (e) {
        btn.textContent = '실패';
        setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 3000);
      }
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
